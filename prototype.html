<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SUHO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.6);
  --green-faint: rgba(0,255,136,0.12);
  --red: #ff4444;
  --yellow: #ffcc00;
  --blue: #4488ff;
}

body {
  background: #050a07;
  color: var(--green);
  font-family: 'Noto Sans KR', sans-serif;
  height: 100dvh;
  overflow: hidden;
}

.bg {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 40%, rgba(0,30,15,0.5) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(0,15,8,0.4) 0%, transparent 50%);
  z-index: 0;
}

.scanlines {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  z-index: 1; pointer-events: none;
}

/* 설정 화면 */
.setup-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; background: #050a07;
}

.setup-screen.hidden { display: none; }

.setup-logo { font-size: 40px; margin-bottom: 16px; }
.setup-title { font-family: 'Share Tech Mono', monospace; font-size: 22px; color: var(--green); margin-bottom: 6px; letter-spacing: 0.15em; }
.setup-sub { font-size: 12px; font-weight: 300; color: var(--green-dim); text-align: center; line-height: 1.7; margin-bottom: 32px; }

.setup-input {
  width: 100%; background: var(--green-faint);
  border: 1px solid var(--green-dim); border-radius: 8px;
  padding: 14px 16px; font-size: 13px; color: var(--green);
  font-family: 'Share Tech Mono', monospace; outline: none; margin-bottom: 10px;
}

.setup-input::placeholder { color: rgba(0,255,136,0.3); }

.setup-btn {
  width: 100%; padding: 14px; background: var(--green);
  color: #050a07; border-radius: 8px; font-size: 14px;
  font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 12px;
}

.setup-link { font-size: 11px; color: var(--green-dim); text-align: center; text-decoration: underline; cursor: pointer; }

/* HUD 화면 */
.hud-screen { position: fixed; inset: 0; z-index: 10; }
.hud-screen.hidden { display: none; }

/* 상단 상태바 */
.status-bar {
  position: absolute; top: 16px; left: 16px; right: 16px;
  display: flex; align-items: center; justify-content: space-between;
}

.ai-indicator {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: rgba(0,255,136,0.4);
  letter-spacing: 0.1em;
}

.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

.signal { width: 10px; height: 10px; border-radius: 50%; opacity: 0; transition: all 0.4s; }
.signal.green { background: var(--green); box-shadow: 0 0 12px var(--green); opacity: 1; }
.signal.yellow { background: var(--yellow); box-shadow: 0 0 12px var(--yellow); opacity: 1; }
.signal.red { background: var(--red); box-shadow: 0 0 12px var(--red); opacity: 1; }

/* 모드 토글 */
.mode-toggles {
  position: absolute; top: 40px; right: 16px;
  display: flex; flex-direction: column; gap: 6px;
}

.mode-btn {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; color: rgba(0,255,136,0.3);
  letter-spacing: 0.1em; cursor: pointer;
  padding: 4px 8px;
  border: 1px solid rgba(0,255,136,0.1);
  border-radius: 4px;
  transition: all 0.2s;
}

.mode-btn.on { color: var(--green); border-color: rgba(0,255,136,0.4); }
.mode-icon { font-size: 12px; }

/* 자막 */
.subtitle {
  position: absolute; top: 60px; left: 20px; right: 80px;
  font-size: 11px; font-weight: 300; color: var(--green-dim);
  line-height: 1.5; opacity: 0; transition: opacity 0.3s;
  max-height: 36px; overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis;
}
.subtitle.visible { opacity: 1; }

/* 결과 컨테이너 */
.results {
  position: absolute; bottom: 100px; top: 120px;
  left: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 12px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}

/* 요약 */
.summary {
  opacity: 0; transition: all 0.4s; transform: translateY(8px);
  flex-shrink: 0;
}
.summary.visible { opacity: 1; transform: translateY(0); }
.summary-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--green-dim); letter-spacing: 0.15em; margin-bottom: 6px; }
.summary-text { font-size: 12px; font-weight: 300; color: var(--green); line-height: 1.8; border-left: 1px solid var(--green-faint); padding-left: 12px; }

/* 응답 제안 */
.reply {
  opacity: 0; transition: all 0.4s 0.1s; transform: translateY(8px);
  flex-shrink: 0;
}
.reply.visible { opacity: 1; transform: translateY(0); }
.reply-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--green-dim); letter-spacing: 0.15em; margin-bottom: 6px; }
.reply-text { font-size: 12px; font-weight: 400; color: var(--green); line-height: 1.6; padding: 8px 12px; border: 1px solid var(--green-faint); background: rgba(0,255,136,0.04); }

/* TTS 표시 */
.tts-indicator {
  position: absolute; bottom: 88px; left: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: var(--blue);
  letter-spacing: 0.1em; opacity: 0; transition: opacity 0.3s;
}
.tts-indicator.visible { opacity: 1; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.blink { animation: blink 1.2s ease infinite; }

.loading {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--green-dim);
  letter-spacing: 0.2em; opacity: 0; transition: opacity 0.3s;
}
.loading.visible { opacity: 1; }

.warning {
  position: absolute; top: 45%; left: 20px; right: 20px;
  font-size: 11px; color: var(--yellow);
  text-align: center; opacity: 0; transition: opacity 0.3s;
}
.warning.visible { opacity: 1; }

/* 컨트롤 */
.controls {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(5,10,7,0.95);
  border-top: 1px solid var(--green-faint);
  padding: 12px 16px 24px;
}

.mic-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--green-faint); border: 2px solid var(--green-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; cursor: pointer; margin: 0 auto 10px;
  transition: all 0.2s;
}

.mic-btn.recording {
  background: rgba(255,68,68,0.15); border-color: var(--red);
  box-shadow: 0 0 20px rgba(255,68,68,0.3);
  animation: blink 1s ease infinite;
}

.mic-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: rgba(0,255,136,0.4);
  letter-spacing: 0.2em; text-align: center; margin-bottom: 10px;
}

.btn-row { display: flex; gap: 8px; }

.ctrl-btn {
  flex: 1; padding: 8px 4px;
  background: var(--green-faint); border: 1px solid rgba(0,255,136,0.2);
  color: var(--green-dim); font-family: 'Share Tech Mono', monospace;
  font-size: 8px; letter-spacing: 0.05em; text-align: center; cursor: pointer;
  transition: all 0.2s;
}
.ctrl-btn:active { background: rgba(0,255,136,0.15); border-color: var(--green); color: var(--green); }

/* 설정 패널 */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.settings-overlay.visible { opacity: 1; pointer-events: all; }

.settings-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0a0f0a; border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--green-faint);
  z-index: 201; transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  max-height: 85dvh; overflow-y: auto;
  padding: 16px 20px 40px;
}
.settings-panel.visible { transform: translateY(0); }

.settings-handle { width: 36px; height: 4px; background: var(--green-faint); border-radius: 2px; margin: 0 auto 20px; }
.settings-title { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--green); letter-spacing: 0.2em; margin-bottom: 20px; }

.settings-section { margin-bottom: 20px; }
.settings-section-title { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--green-dim); letter-spacing: 0.15em; margin-bottom: 10px; }

.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--green-faint);
}

.settings-row-text { font-size: 12px; font-weight: 300; color: var(--green); }
.settings-row-sub { font-size: 10px; color: var(--green-dim); margin-top: 2px; }

.settings-input {
  width: 100%; background: var(--green-faint);
  border: 1px solid rgba(0,255,136,0.2); border-radius: 6px;
  padding: 10px 12px; font-size: 11px; color: var(--green);
  font-family: 'Share Tech Mono', monospace; outline: none;
  margin-top: 8px;
}
.settings-input::placeholder { color: rgba(0,255,136,0.2); }

.settings-link { font-size: 10px; color: var(--green-dim); text-decoration: underline; cursor: pointer; margin-top: 4px; display: block; }

.settings-save {
  width: 100%; padding: 12px; background: var(--green);
  color: #050a07; border-radius: 8px; font-size: 13px;
  font-weight: 600; cursor: pointer; text-align: center; margin-top: 16px;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="scanlines"></div>

<!-- 설정 화면 -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-logo">👁</div>
  <div class="setup-title">SUHO</div>
  <div class="setup-sub">당신의 대화를 지켜주는 AI<br><br>Gemini API 키를 입력해서 시작해</div>
  <input class="setup-input" id="apiKeyInput" type="password" placeholder="Gemini API 키 (AIza...)" />
  <div class="setup-btn" onclick="startApp()">시작하기</div>
  <div class="setup-link" onclick="window.open('https://aistudio.google.com/apikey')">Gemini API 키 발급하기 →</div>
</div>

<!-- HUD 화면 -->
<div class="hud-screen hidden" id="hudScreen">

  <div class="status-bar">
    <div class="ai-indicator">
      <div class="ai-dot"></div>
      <span id="aiName">GEMINI</span>
    </div>
    <div class="signal" id="signal"></div>
  </div>

  <div class="mode-toggles">
    <div class="mode-btn on" id="soundBtn" onclick="toggleMode('sound')">
      <span class="mode-icon">🔊</span> SOUND
    </div>
    <div class="mode-btn on" id="displayBtn" onclick="toggleMode('display')">
      <span class="mode-icon">👁</span> DISPLAY
    </div>
  </div>

  <div class="loading blink" id="loading">ANALYZING ·</div>
  <div class="warning" id="warning"></div>
  <div class="subtitle" id="subtitle"></div>

  <div class="results">
    <div class="summary" id="summary">
      <div class="summary-label">SUMMARY ·</div>
      <div class="summary-text" id="summaryText"></div>
    </div>

    <div class="reply" id="reply">
      <div class="reply-label">REPLY ·</div>
      <div class="reply-text" id="replyText"></div>
    </div>
  </div>

  <div class="tts-indicator blink" id="ttsIndicator">🔊 READING ·</div>

  <div class="controls">
    <!-- 텍스트 입력창 -->
    <div id="textInputWrap" style="display:none;margin-bottom:10px;">
      <div style="display:flex;gap:8px;">
        <input id="textInput" placeholder="직접 입력해봐..."
          style="flex:1;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);border-radius:6px;padding:10px 12px;font-size:13px;color:#00ff88;outline:none;font-family:'Noto Sans KR',sans-serif;" />
        <div onclick="submitText()" style="padding:10px 14px;background:rgba(0,255,136,0.15);border:1px solid rgba(0,255,136,0.4);border-radius:6px;font-size:18px;cursor:pointer;">→</div>
      </div>
    </div>

    <div class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</div>
    <div class="mic-status" id="micStatus">AUTO · 자동 감지 중</div>
    <div class="btn-row">
      <div class="ctrl-btn" onclick="analyzeNow()">지금 분석</div>
      <div class="ctrl-btn" onclick="clearAll()">초기화</div>
      <div class="ctrl-btn" id="inputModeBtn" onclick="cycleInputMode()">🎙️ AUTO</div>
      <div class="ctrl-btn" onclick="openSettings()">설정</div>
      <div class="ctrl-btn" onclick="window.location.href='index.html'">홈</div>
    </div>
  </div>

</div>

<!-- 설정 패널 -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-handle"></div>
  <div class="settings-title">SETTINGS ·</div>

  <div class="settings-section">
    <div class="settings-section-title">API 키</div>
    <div class="settings-row">
      <div>
        <div class="settings-row-text">Gemini</div>
        <div class="settings-row-sub">기본 AI · 무료 한도 있음</div>
      </div>
    </div>
    <input class="settings-input" id="geminiKeyInput" type="password" placeholder="AIza..." />
    <a class="settings-link" onclick="window.open('https://aistudio.google.com/apikey')">발급하러 가기 →</a>

    <div class="settings-row" style="margin-top:12px;">
      <div>
        <div class="settings-row-text">Groq</div>
        <div class="settings-row-sub">Gemini 한도 초과 시 자동 전환 · 매일 리셋</div>
      </div>
    </div>
    <input class="settings-input" id="groqKeyInput" type="password" placeholder="gsk_..." />
    <a class="settings-link" onclick="window.open('https://console.groq.com/keys')">발급하러 가기 →</a>
  </div>

  <div class="settings-save" onclick="saveSettings()">저장하기</div>
</div>

<script>
  let apiKey = '';
  let openrouterKey = '';
  let groqKey = '';
  let currentAI = 'gemini';
  let recognition = null;
  let isRecording = false;
  let fullTranscript = '';
  let analyzeTimer = null;
  let soundMode = true;
  let displayMode = true;
  let synth = window.speechSynthesis;

  // 입력 모드: 'auto' | 'manual' | 'text'
  let inputMode = 'auto';
  const inputModes = ['auto', 'manual', 'text'];

  function setInputMode(mode) {
    inputMode = mode;
    const status = document.getElementById('micStatus');
    const micBtn = document.getElementById('micBtn');
    const textWrap = document.getElementById('textInputWrap');
    const modeBtn = document.getElementById('inputModeBtn');

    const modeLabels = { auto: '🎙️ AUTO', manual: '🎙️ MANUAL', text: '⌨️ TEXT' };
    const statusLabels = { auto: 'AUTO · 말하면 자동 감지', manual: 'MANUAL · 탭해서 녹음', text: 'TEXT · 직접 입력' };

    if(modeBtn) modeBtn.textContent = modeLabels[mode];
    if(status) status.textContent = statusLabels[mode];

    if(mode === 'auto') {
      textWrap.style.display = 'none';
      micBtn.style.display = 'flex';
      stopMic();
      startVAD();
    } else if(mode === 'manual') {
      stopVAD();
      textWrap.style.display = 'none';
      micBtn.style.display = 'flex';
      if(isRecording) stopMic();
    } else {
      stopVAD();
      if(isRecording) stopMic();
      textWrap.style.display = 'block';
      micBtn.style.display = 'none';
    }
  }

  function toggleMic() {
    if(navigator.vibrate) navigator.vibrate(30);
    if(isRecording) stopMic();
    else startMic();
  }

  function cycleInputMode() {
    const idx = inputModes.indexOf(inputMode);
    const next = inputModes[(idx + 1) % inputModes.length];
    setInputMode(next);
    if(navigator.vibrate) navigator.vibrate(50);
  }

  // 텍스트 입력 제출
  function submitText() {
    const input = document.getElementById('textInput');
    const text = input.value.trim();
    if(!text) return;
    fullTranscript += text + ' ';
    if(displayMode) {
      document.getElementById('subtitle').textContent = text.slice(0, 30);
      document.getElementById('subtitle').classList.add('visible');
    }
    input.value = '';
    setSignal('yellow');
    analyzeNow();
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Enter' && inputMode === 'text') submitText();
  });

  // 저장된 키 불러오기
  window.onload = () => {
    const savedGemini = localStorage.getItem('suho_gemini');
    const savedOR = localStorage.getItem('suho_openrouter');
    const savedGroq = localStorage.getItem('suho_groq');
    if(savedGemini) {
      apiKey = savedGemini;
      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('hudScreen').classList.remove('hidden');
      initSpeech();
      setTimeout(() => setInputMode('auto'), 500);
    }
    if(savedOR) openrouterKey = savedOR;
    if(savedGroq) groqKey = savedGroq;

    // Wake Lock — 화면 꺼짐 방지
    if('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(() => {});
    }
  };

  function startApp() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if(!key || !key.startsWith('AIza')) {
      alert('올바른 Gemini API 키를 입력해줘 (AIza로 시작)');
      return;
    }
    apiKey = key;
    localStorage.setItem('suho_gemini', key);
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('hudScreen').classList.remove('hidden');
    initSpeech();
    setTimeout(() => setInputMode('auto'), 500);
  }

  function initSpeech() {
    if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('micStatus').textContent = '음성 인식 미지원 브라우저';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      let interim = '';
      let final = '';
      for(let i = e.resultIndex; i < e.results.length; i++) {
        if(e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      if(final) {
        fullTranscript += final + ' ';
        if(displayMode) showSubtitle(fullTranscript.slice(-80));
        setSignal('yellow');
        clearTimeout(analyzeTimer);
        // AUTO 모드: 2초 침묵 후 자동 분석 / MANUAL 모드: 3초
        const delay = inputMode === 'auto' ? 2000 : 3000;
        analyzeTimer = setTimeout(() => {
          if(fullTranscript.trim().length > 10) analyzeNow();
        }, delay);
      } else if(interim && displayMode) {
        showSubtitle((fullTranscript + interim).slice(-80));
      }
    };

    recognition.onerror = (e) => {
      if(e.error !== 'no-speech') { stopMic(); }
    };

    recognition.onend = () => {
      if(isRecording) { try { recognition.start(); } catch(e) {} }
    };
  }

  // VAD 관련 변수
  let audioContext = null;
  let analyser = null;
  let vadStream = null;
  let vadTimer = null;
  let isSpeaking = false;
  let silenceTimer = null;
  const VOLUME_THRESHOLD = 20; // 볼륨 임계값 (0~255)
  const SILENCE_DELAY = 1500; // 침묵 1.5초 후 분석

  async function startVAD() {
    try {
      vadStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(vadStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);

      const dataArray = new Uint8Array(analyser.frequencyBinCount);

      function checkVolume() {
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

        if(avg > VOLUME_THRESHOLD) {
          // 말하고 있음
          if(!isSpeaking) {
            isSpeaking = true;
            if(!isRecording) startMic();
          }
          clearTimeout(silenceTimer);
          silenceTimer = setTimeout(() => {
            // 침묵 감지 → 분석
            isSpeaking = false;
            if(fullTranscript.trim().length > 5) {
              analyzeNow();
            }
          }, SILENCE_DELAY);
        }

        if(inputMode === 'auto') {
          vadTimer = requestAnimationFrame(checkVolume);
        }
      }

      checkVolume();
    } catch(e) {
      showWarning('마이크 접근 실패. 권한을 확인해봐.');
    }
  }

  function stopVAD() {
    if(vadTimer) cancelAnimationFrame(vadTimer);
    if(silenceTimer) clearTimeout(silenceTimer);
    if(vadStream) vadStream.getTracks().forEach(t => t.stop());
    if(audioContext) audioContext.close();
    audioContext = null; analyser = null; vadStream = null;
    isSpeaking = false;
  }

  function startMic() {
    if(!recognition) return;
    try {
      recognition.start();
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹️';
      document.getElementById('micStatus').textContent = '녹음 중 · 말해봐';
      setSignal('green');
    } catch(e) {}
  }

  function stopMic() {
    if(!recognition) return;

    const isWork = workKeywords.some(w => fullTranscript.includes(w));

    const prompt = isWork ?

  async function callGemini(prompt) {
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.3, maxOutputTokens: 300 } })
      });
      const data = await res.json();
      if(data.error) return null;
      return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
    } catch(e) { return null; }
  }

  async function callOpenRouter(prompt) {
    const freeModels = [
      'deepseek/deepseek-chat-v3-0324:free',
      'meta-llama/llama-3.3-70b-instruct:free',
      'google/gemma-3-27b-it:free',
      'qwen/qwen3-8b:free',
      'mistralai/mistral-7b-instruct:free'
    ];

    for(const model of freeModels) {
      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openrouterKey}` },
          body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], max_tokens: 300 })
        });
        const data = await res.json();
        if(data.error) {
          showWarning(`OR오류(${model.split('/')[1]?.split(':')[0]}): ${data.error.message?.slice(0,50)}`);
          continue;
        }
        const text = data.choices?.[0]?.message?.content;
        if(text) return text;
      } catch(e) { continue; }
    }
    return null;
  }

  async function callGroq(prompt) {
    const models = [
      'llama-3.3-70b-versatile',
      'llama3-70b-8192',
      'llama3-8b-8192',
      'gemma2-9b-it'
    ];

    for(const model of models) {
      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
          body: JSON.stringify({ model, messages: [
            { role: 'system', content: '당신은 한국어로만 답변하는 AI입니다. 영어 단어를 절대 사용하지 마세요. 모든 답변을 순수 한국어로만 작성하세요.' },
            { role: 'user', content: prompt }
          ], max_tokens: 400 })
        });
        const data = await res.json();
        if(data.error) { console.log('Groq error:', model, data.error.message); continue; }
        const text = data.choices?.[0]?.message?.content;
        if(text) return text;
      } catch(e) { console.log('Groq catch:', model, e); continue; }
    }
    return null;
  }

  function updateAIName(name) {
    document.getElementById('aiName').textContent = name;
  }

  function parseAndDisplay(text) {
    let signal = 'green';
    let summary = '';
    let reply = '';
    let context = '';
    let terms = '';

    const signalMatch = text.match(/\[신호\]\s*(.+)/);
    const summaryMatch = text.match(/\[요약\]\s*(.+)/);
    const replyMatch = text.match(/\[대답\]\s*(.+)/);
    const contextMatch = text.match(/\[맥락\]\s*(.+)/);
    const termsMatch = text.match(/\[용어\]\s*([\s\S]+?)(?=\[|$)/);

    if(signalMatch) {
      const val = signalMatch[1];
      if(val.includes('빨강') || val.includes('red')) signal = 'red';
      else if(val.includes('노랑') || val.includes('yellow')) signal = 'yellow';
      else signal = 'green';
    }

    if(summaryMatch) summary = summaryMatch[1].trim();
    if(replyMatch) reply = replyMatch[1].trim();
    if(contextMatch) context = contextMatch[1].trim();
    if(termsMatch) terms = termsMatch[1].trim();

    if(!summary && !reply) summary = text.slice(0, 100);

    setSignal(signal);

    if(displayMode) {
      if(summary) {
        document.getElementById('summaryText').textContent = summary + (context ? '\n' + context : '');
        document.getElementById('summary').classList.add('visible');
      }
      if(reply) {
        document.getElementById('replyText').textContent = reply;
        document.getElementById('reply').classList.add('visible');
      } else if(summary) {
        document.getElementById('replyText').textContent = '잠시 생각해보고 대답해도 좋아.';
        document.getElementById('reply').classList.add('visible');
      }
    }

    if(soundMode && (summary || reply)) {
      setTimeout(() => {
        const ttsText = (summary ? '요약. ' + summary + '. ' : '') + (reply ? '대답. ' + reply : '');
        speak(ttsText);
      }, 800);
    }
  }

  function speak(text) {
    if(!synth) return;
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ko-KR';
    utt.volume = 0.6;
    utt.rate = 1.1;

    utt.onstart = () => document.getElementById('ttsIndicator').classList.add('visible');
    utt.onend = () => document.getElementById('ttsIndicator').classList.remove('visible');

    synth.speak(utt);
  }

  function toggleMode(mode) {
    if(mode === 'sound') {
      soundMode = !soundMode;
      document.getElementById('soundBtn').classList.toggle('on', soundMode);
    } else {
      displayMode = !displayMode;
      document.getElementById('displayBtn').classList.toggle('on', displayMode);
      if(!displayMode) {
        document.getElementById('subtitle').classList.remove('visible');
        document.getElementById('summary').classList.remove('visible');
        document.getElementById('reply').classList.remove('visible');
      }
    }
  }

  function showWarning(msg) {
    const el = document.getElementById('warning');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 4000);
  }

  function clearAll() {
    fullTranscript = '';
    clearTimeout(analyzeTimer);
    synth.cancel();
    document.getElementById('subtitle').classList.remove('visible');
    document.getElementById('summary').classList.remove('visible');
    document.getElementById('reply').classList.remove('visible');
    document.getElementById('warning').classList.remove('visible');
    document.getElementById('ttsIndicator').classList.remove('visible');
    document.getElementById('signal').className = 'signal';
    document.getElementById('subtitle').textContent = '';
  }

  function openSettings() {
    document.getElementById('geminiKeyInput').value = localStorage.getItem('suho_gemini') || '';
    document.getElementById('groqKeyInput').value = localStorage.getItem('suho_groq') || '';
    document.getElementById('settingsOverlay').classList.add('visible');
    document.getElementById('settingsPanel').classList.add('visible');
  }

  function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('visible');
    document.getElementById('settingsPanel').classList.remove('visible');
  }

  function saveSettings() {
    const g = document.getElementById('geminiKeyInput').value.trim();
    const gr = document.getElementById('groqKeyInput').value.trim();
    if(g) { apiKey = g; localStorage.setItem('suho_gemini', g); }
    if(gr) { groqKey = gr; localStorage.setItem('suho_groq', gr); }
    closeSettings();
    showWarning('저장됐어 ✓');
  }
